name: publish

# Publishes light-mem to npmjs on every push to main. Policy: every merge to
# main cuts a new release.
#
# Triggered by:
#   * push to main              — every merge
#   * workflow_dispatch         — manual retry / force republish
#
# Flow:
#   1. Resolve the version in package.json.
#   2. If that version is already on npm (a plain merge that didn't bump the
#      version), auto-bump the patch (scripts/bump-version.cjs), rebuild so the
#      version baked into the worker .cjs matches, and commit the bump back to
#      main. If it's NOT on npm yet (a merge that already bumped, or the first
#      publish), use it as-is.
#   3. npm run build (prepublishOnly path: build + check-postinstall-allowlist).
#   4. npm publish.
#   5. Create + push the annotated git tag v<version>, then a GitHub release.
#
# Bump + publish run in the SAME job on purpose: a commit pushed with
# GITHUB_TOKEN does NOT trigger a new workflow run (GitHub loop-prevention), so
# we can't bump-then-push-and-let-it-re-fire. The committed bump just persists
# the new version in the repo; the publish in this same run ships it. The
# concurrency group serializes runs so a fast second merge can't race the
# push-back.
#
# Auth:
#   NPM_TOKEN secret (Automation token). GITHUB_TOKEN (contents: write) pushes
#   the bump commit + tag. See docs/publishing.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # to create git tags

concurrency:
  # One publish at a time. Cancelling a queued run is fine; we just don't want
  # two parallel publishes racing against the registry.
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for `git show HEAD:package.json`

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve & auto-bump version
        id: ver
        # Policy: every push to main publishes a release. If the version in
        # package.json is already on npm (a plain merge that didn't bump), bump
        # the patch here, rebuild so the version baked into the worker .cjs
        # matches, and commit the bump back to main. Bump + publish happen in
        # the SAME run on purpose: a commit pushed with GITHUB_TOKEN does not
        # trigger a new workflow run, so we cannot rely on a push-back to
        # re-fire this workflow. The committed bump just persists the new
        # version in the repo.
        run: |
          set -euo pipefail
          CURRENT=$(node -p "require('./package.json').version")
          echo "package.json version: $CURRENT"

          set +e
          PUBLISHED=$(npm view "light-mem@${CURRENT}" version 2>/dev/null)
          set -e

          if [ -n "$PUBLISHED" ]; then
            echo "v${CURRENT} already on npm — auto-bumping patch."
            node scripts/bump-version.cjs patch
            npm run build
            NEW=$(node -p "require('./package.json').version")
            echo "Bumped ${CURRENT} -> ${NEW}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # Commit the bump (package.json + all synced manifests + rebuilt .cjs).
            git add -A
            git commit -m "chore(release): auto-bump to ${NEW} [skip ci]"
            git push origin HEAD:main
            echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          else
            echo "v${CURRENT} not yet on npm — publishing as-is."
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (prepublishOnly path)
        run: npm run build

      - name: Publish to npm
        # npm >=10 reads credentials from a project-local .npmrc, not from the
        # NODE_AUTH_TOKEN env var. Write a temp .npmrc for this step only.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          {
            echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'
            echo 'registry=https://registry.npmjs.org/'
          } > .npmrc
          npm publish --access public
          rm -f .npmrc

      - name: Create git tag
        # Tag the published version. Runs only after a successful publish, so
        # the tag never points at a version that isn't on the registry.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Create GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}